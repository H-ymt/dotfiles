onboarding = false

# TUI がカーソルを隠していても、IME が候補ウィンドウの位置を
# 追えるように外側のターミナルへカーソル位置を公開する
reveal_hidden_cursor_for_cjk_ime = true

# 上の設定を適用するエージェント（フォーカス中のペインで判定）
cjk_ime_agents = ["claude", "codex", "kiro", "omp"]
# IME 用に表示するカーソルの形状
cjk_ime_cursor_shape = "steady_block"

# prefix モードの間だけ macOS の入力ソースを ASCII 系に切り替え、抜けたら元の入力ソースに戻す
switch_ascii_input_source_in_prefix = true

[theme]
name = "tokyo-night"
auto_switch = false

[ui]
agent_panel_sort = "spaces"

[ui.toast]
delivery = "herdr"

[[keys.command]]
key = "prefix+alt+g"
type = "popup"
command = "lazygit"
width = "80%"
height = "80%"

# herdr-file-viewer: prefix+f で split 起動
[[keys.command]]
key = "prefix+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer --plugin herdr-file-viewer"
description = "Open file viewer in split pane"

# prefix+shift+f でタブ起動
[[keys.command]]
key = "prefix+shift+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer-tab --plugin herdr-file-viewer"
description = "Open file viewer in new tab"

# herdr-plugin-hunk: prefix+h で worktree diff
[[keys.command]]
key = "prefix+h"
type = "shell"
command = "herdr plugin action invoke worktree-split --plugin hunk.diff"
description = "Open worktree diff in split pane"
