[bootstrap.repos]
"~/.tmux/plugins/tpm" = { url = "https://github.com/tmux-plugins/tpm.git", ref = "master" }
"~/.tmux/plugins/tmux" = { url = "https://github.com/tmux-plugins/tmux.git", ref = "master" }
"~/.tmux/plugins/tmux-resurrect" = { url = "https://github.com/tmux-plugins/tmux-resurrect.git", ref = "master" }
"~/.tmux/plugins/tmux-continuum" = { url = "https://github.com/tmux-plugins/tmux-continuum.git", ref = "master" }
"~/.tmux/plugins/tmux-battery" = { url = "https://github.com/tmux-plugins/tmux-battery.git", ref = "master" }
"~/.tmux/plugins/tmux-online-status" = { url = "https://github.com/tmux-plugins/tmux-online-status.git", ref = "master" }
"~/.tmux/plugins/vim-tmux-navigator" = { url = "https://github.com/tmux-plugins/vim-tmux-navigator.git", ref = "master" }
"~/.tmux/plugins/tmux-sessionx" = { url = "https://github.com/omerxx/tmux-sessionx.git", ref = "main" }

[bootstrap.hooks.post-packages]
run = [
  "gh auth status >/dev/null 2>&1 && gh extension list | grep -q seachicken/gh-poi || gh extension install seachicken/gh-poi 2>/dev/null || true",
  "brew services restart ollama postgresql@14 || true",
]

[bootstrap.hooks.post-dotfiles]
run = [
  "chmod 600 ~/.config/karabiner/karabiner.json ~/.config/zed/settings.json ~/.config/nvim/lua/plugins/colorscheme.lua",
  "apm install --target all || true",
  "bat cache --build || true",
]

[dotfiles]
"~/.zshrc" = { source = ".zshrc", mode = "symlink" }
"~/.gitconfig" = { source = ".gitconfig", mode = "symlink" }
"~/.bunfig.toml" = { source = ".bunfig.toml", mode = "symlink" }
"~/.claude/CLAUDE.md" = { source = ".claude/CLAUDE.md.tmpl", mode = "template" }

"~/.config/zed/keymap.json" = { source = ".config/zed/keymap.json", mode = "symlink" }
"~/.config/zed/settings.json" = { source = ".config/zed/settings.json", mode = "symlink" }

"~/.config/mise/config.toml" = { source = "mise.toml", mode = "symlink" }

"~/.config/nvim/init.lua" = { source = ".config/nvim/init.lua", mode = "symlink" }
